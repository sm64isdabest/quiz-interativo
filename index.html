<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Quiz Interativo</title>
  </head>

  <body>
    <main>
      <div id="menu">
        <h1 class="consolas-font">Quiz</h1>
        <p class="consolas-font" id="splash_text">Texto legal</p>
        <!-- <p class="consolas-font">Recorde:</p> -->

        <button class="consolas-font" id="play_button">Jogar</button>
        <button class="consolas-font" id="about_button">Sobre</button>
      </div>

      <div id="about">
        <div class="window-header">
          <div class="left-side">
            <picture>
              <img src="" alt="Ícone do Quiz Interativo" />
            </picture>

            <h1 class="consolas-font">sobre.exe</h1>
          </div>

          <button id="close_button"><i class="bi bi-x-lg"></i></button>
        </div>

        <div class="window">
          <h2 class="consolas-font">Sobre o projeto:</h2>
          <p></p>
        </div>
      </div>

      <div id="play_area">
        <div class="dificulty-box">
          <p class="consolas-font" id="easy">> FÁCIL <</p>
          <p class="consolas-font" id="medium">MÉDIO</p>
          <p class="consolas-font" id="hard">DIFÍCIL</p>
        </div>

        <div id="question-box">
          <h1 class="consolas-font" id="question_title">Question 1</h1>
          <h2 class="consolas-font" id="question"></h2>
          <picture>
            <img id="question_image" src="" alt="" />
          </picture>

          <!-- Estará invisível até o jogo acabar -->
          <button class="consolas-font" id="return">Voltar</button>
        </div>

        <!-- OPTION 1 -->
        <button class="option" id="option_1">
          <i class="bi bi-1-circle-fill"></i>
          <p class="consolas-font" id="answer"></p>
        </button>

        <!-- OPTION 2 -->
        <button class="option" id="option_2">
          <i class="bi bi-2-circle-fill"></i>
          <p class="consolas-font" id="answer"></p>
        </button>

        <!-- OPTION 3 -->
        <button class="option" id="option_3">
          <i class="bi bi-3-circle-fill"></i>
          <p class="consolas-font" id="answer"></p>
        </button>

        <!-- OPTION 4 -->
        <button class="option" id="option_4">
          <i class="bi bi-4-circle-fill"></i>
          <p class="consolas-font" id="answer"></p>
        </button>
      </div>
    </main>

    <script type="module" src="js/switch-screen.js"></script>
    <script src="js/splash-text.js"></script>
    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/questions.js"></script>
  </body>
</html>
